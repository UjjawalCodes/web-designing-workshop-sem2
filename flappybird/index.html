<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flappy Bird</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            background-image: url("https://codakid.com/wp-content/uploads/2024/08/Flappy-Bird.jpeg");
            background-size: cover;    
            background-position: center;
            background-repeat: no-repeat;
            font-family: Arial, sans-serif;
            color: #fff;
        }

        h1 {
            text-align: center;
            margin-top: 40px;
        }
        .container{
            height: 100vh;
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: center;


        }
        .container a {
            text-decoration: none;
            background-color: rgba(109, 248, 9, 0.842);
            color: white;
            padding: 40px 80px;
            margin-top: 300px;
            border-radius: 18px;

        }
        .container a:hover{
            transform: scale(1.08);
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="./start.html">Start</a>
    </div>
</body>
</html>
