<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Experiment-6</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1 class="heading">
            This is a heading
        </h1>
        
        <form >
            <input type="text" name="" id="text" placeholder="Enter new heading text">
            <br><br>
            <button type="button" id="changeHeading">Change Heading</button>
            <button type="button" id="changeBackground">Change Background</button>
            <button type="button" id="increaseFont">Increase Font</button>
            <button type="button" id="showHidePara">Show/Hide Paragraph</button>
            <button type="button" id="reset">Reset</button>
        </form>
        <p id="paragraph">This is a sample Para. JavaScript events can dynamically change content.</p>
    </div>
    <script src="./main.js"></script>
</body>
</html>
